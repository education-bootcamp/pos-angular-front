<div class="dialog-container">
  <div class="dialog-header">
    <mat-icon class="header-icon">edit</mat-icon>
    <h2>Update Product</h2>
    <button class="close-btn" (click)="close()">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <div class="dialog-body">
    <div class="product-id-badge">Product ID: #{{ data.id }}</div>
    <form [formGroup]="form">
      <div class="form-group">
        <label>Description <span class="required">*</span></label>
        <div class="input-wrapper">
          <mat-icon class="input-icon">inventory_2</mat-icon>
          <input formControlName="description" type="text" placeholder="Enter product description"
                 [class.error]="form.get('description')?.invalid && form.get('description')?.touched" />
        </div>
        <span class="error-msg" *ngIf="form.get('description')?.invalid && form.get('description')?.touched">Description is required</span>
      </div>

      <div class="form-group">
        <label>Quantity on Hand <span class="required">*</span></label>
        <div class="input-wrapper">
          <mat-icon class="input-icon">warehouse</mat-icon>
          <input formControlName="qtyOnHand" type="number" placeholder="Enter quantity" min="0"
                 [class.error]="form.get('qtyOnHand')?.invalid && form.get('qtyOnHand')?.touched" />
        </div>
        <span class="error-msg" *ngIf="form.get('qtyOnHand')?.invalid && form.get('qtyOnHand')?.touched">Valid quantity is required</span>
      </div>

      <div class="form-group">
        <label>Unit Price <span class="required">*</span></label>
        <div class="input-wrapper">
          <mat-icon class="input-icon">sell</mat-icon>
          <input formControlName="unitPrice" type="number" placeholder="Enter unit price" min="0" step="0.01"
                 [class.error]="form.get('unitPrice')?.invalid && form.get('unitPrice')?.touched" />
        </div>
        <span class="error-msg" *ngIf="form.get('unitPrice')?.invalid && form.get('unitPrice')?.touched">Valid unit price is required</span>
      </div>
    </form>
  </div>

  <div class="dialog-footer">
    <button class="btn-cancel" (click)="close()">Cancel</button>
    <button class="btn-save" (click)="save()" [disabled]="form.invalid">
      <mat-icon>save</mat-icon>
      Save Changes
    </button>
  </div>
</div>

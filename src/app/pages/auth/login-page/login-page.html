<div class="outer">
  <div class="inner">
    <form [formGroup]="loginForm" (ngSubmit)="execute()">
    <mat-form-field class="full-width" appearance="fill">
      <mat-label>Email</mat-label>
      <input formControlName="email" type="email" matInput placeholder="Ex. pat@example.com">
    </mat-form-field>

    <mat-form-field class="full-width" appearance="fill">
      <mat-label>Password</mat-label>
      <input formControlName="password" type="password" matInput>
    </mat-form-field>
      <button style="width:100%" matButton="tonal" type="submit">Login</button>
    </form>

    <hr>

    <a routerLink="/home/signup">new here? create an Account.</a>

  </div>
</div>
